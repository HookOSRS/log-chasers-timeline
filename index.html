<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Log Chasers – Collection Log Timeline</title>
  <style>
    :root {
      --bg: #111318;
      --surface: #1a1d26;
      --surface2: #222638;
      --border: #2a2e42;
      --accent: #e94560;
      --text: #dde1f0;
      --muted: #6b7299;
      --green: #4cbe7e;
    }
    * { box-sizing: border-box; margin: 0; padding: 0; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: system-ui, -apple-system, sans-serif;
      font-size: 14px;
      height: 100vh;
      display: flex;
      flex-direction: column;
      overflow: hidden;
    }

    /* Header */
    header {
      background: var(--surface2);
      border-bottom: 1px solid var(--border);
      padding: 0 16px;
      height: 44px;
      display: flex;
      align-items: center;
      gap: 12px;
      flex-shrink: 0;
    }
    header h1 { font-size: 15px; font-weight: 600; letter-spacing: 0.02em; }
    header .meta { color: var(--muted); font-size: 12px; }

    /* Layout */
    .layout { display: flex; flex: 1; overflow: hidden; }

    /* Left panel */
    .left-panel {
      width: 280px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }
    .tabs {
      display: flex;
      border-bottom: 1px solid var(--border);
      flex-shrink: 0;
    }
    .tab-btn {
      flex: 1;
      padding: 9px 0;
      background: none;
      border: none;
      border-bottom: 2px solid transparent;
      color: var(--muted);
      cursor: pointer;
      font-size: 12px;
      font-weight: 500;
      letter-spacing: 0.04em;
      text-transform: uppercase;
    }
    .tab-btn.active {
      color: var(--text);
      border-bottom-color: var(--accent);
    }
    .panel-body { overflow-y: auto; flex: 1; }

    /* Search */
    .search-wrap { padding: 8px; border-bottom: 1px solid var(--border); }
    .search-wrap { position: relative; }
    .search-wrap input {
      width: 100%;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 5px 28px 5px 9px;
      color: var(--text);
      font-size: 13px;
      outline: none;
    }
    .search-wrap input:focus { border-color: var(--accent); }
    .search-clear {
      position: absolute;
      right: 7px;
      top: 50%;
      transform: translateY(-50%);
      background: none;
      border: none;
      color: var(--muted);
      cursor: pointer;
      font-size: 15px;
      line-height: 1;
      padding: 0;
      display: none;
    }
    .search-clear:hover { color: var(--text); }

    /* Run entries */
    .run-entry { border-bottom: 1px solid var(--border); }
    .run-header {
      padding: 9px 12px;
      cursor: pointer;
      user-select: none;
    }
    .run-header:hover { background: var(--surface2); }
    .run-date { font-size: 13px; }
    .run-sub { color: var(--muted); font-size: 11px; margin-top: 2px; }
    .run-chips {
      display: flex;
      flex-wrap: wrap;
      gap: 4px;
      padding: 0 12px 9px;
    }
    .chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 2px 7px;
      font-size: 11px;
      cursor: pointer;
    }
    .chip:hover { background: var(--accent); border-color: var(--accent); }

    /* Member list */
    .member-row {
      padding: 8px 12px;
      border-bottom: 1px solid var(--border);
      cursor: pointer;
      display: flex;
      justify-content: space-between;
      align-items: baseline;
    }
    .member-row:hover { background: var(--surface2); }
    .member-row.active { background: var(--surface2); border-left: 2px solid var(--accent); }
    .member-row-name { font-size: 13px; }
    .member-row-date { font-size: 11px; color: var(--muted); }

    /* Right panel */
    .right-panel { flex: 1; display: flex; flex-direction: column; overflow: hidden; }
    .placeholder {
      flex: 1;
      display: flex;
      align-items: center;
      justify-content: center;
      color: var(--muted);
      font-size: 13px;
    }

    /* Member detail */
    .detail-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 12px 18px;
      flex-shrink: 0;
    }
    .detail-header h2 { font-size: 15px; font-weight: 600; }
    .detail-header .detail-meta { color: var(--muted); font-size: 12px; margin-top: 3px; }
    .detail-body { display: flex; flex: 1; overflow: hidden; }

    /* Snapshot picker */
    .snap-picker {
      width: 230px;
      flex-shrink: 0;
      border-right: 1px solid var(--border);
      display: flex;
      flex-direction: column;
      overflow: hidden;
      background: var(--surface);
    }
    .snap-picker-head {
      display: grid;
      grid-template-columns: 28px 28px 1fr auto;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
    }
    .snap-list { overflow-y: auto; flex: 1; }
    .snap-row {
      display: grid;
      grid-template-columns: 28px 28px 1fr auto;
      align-items: center;
      padding: 6px 10px;
      border-bottom: 1px solid var(--border);
      font-size: 12px;
    }
    .snap-row:hover { background: var(--surface2); }
    .snap-row input[type=radio] { accent-color: var(--accent); cursor: pointer; }
    .snap-badge { color: var(--green); font-size: 11px; font-weight: 600; }
    .compare-wrap { padding: 8px 10px; border-top: 1px solid var(--border); flex-shrink: 0; }
    .compare-btn {
      width: 100%;
      padding: 7px 0;
      background: var(--accent);
      border: none;
      border-radius: 4px;
      color: #fff;
      font-size: 13px;
      font-weight: 500;
      cursor: pointer;
    }
    .compare-btn:disabled {
      background: var(--border);
      color: var(--muted);
      cursor: default;
    }

    /* Comparison area */
    .cmp-area { flex: 1; overflow-y: auto; padding: 16px 20px; }
    .cmp-heading {
      font-size: 12px;
      color: var(--muted);
      margin-bottom: 14px;
      letter-spacing: 0.02em;
    }
    .cmp-heading strong { color: var(--text); }
    table { width: 100%; border-collapse: collapse; }
    th {
      text-align: left;
      padding: 6px 10px;
      font-size: 11px;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
      color: var(--muted);
      border-bottom: 1px solid var(--border);
    }
    td { padding: 7px 10px; border-bottom: 1px solid var(--border); font-size: 13px; }
    tr:hover td { background: var(--surface); }
    .td-num { text-align: right; font-variant-numeric: tabular-nums; }
    .delta { color: var(--green); font-weight: 600; text-align: right; font-variant-numeric: tabular-nums; }
    .empty-msg { color: var(--muted); font-size: 13px; text-align: center; padding: 32px 0; }

    .loading { color: var(--muted); font-size: 13px; padding: 20px; text-align: center; }

    .run-entry.active .run-header { border-left: 2px solid var(--accent); background: var(--surface2); }

    .overview-header {
      background: var(--surface);
      border-bottom: 1px solid var(--border);
      padding: 14px 18px;
      flex-shrink: 0;
    }
    .overview-body { overflow-y: auto; flex: 1; padding: 4px 0; }
    .overview-section { padding: 12px 18px; border-bottom: 1px solid var(--border); }
    .overview-section-title {
      font-size: 10px;
      font-weight: 600;
      letter-spacing: 0.06em;
      text-transform: uppercase;
      color: var(--muted);
      margin-bottom: 8px;
    }
    .item-summary { display: flex; flex-wrap: wrap; gap: 5px; }
    .item-chip {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 3px;
      padding: 3px 8px;
      font-size: 12px;
      cursor: default;
      user-select: none;
    }
    .item-chip:hover { border-color: var(--muted); }

    .item-list { display: flex; flex-direction: column; gap: 1px; }
    .item-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 4px 6px;
      border-radius: 3px;
      cursor: default;
      font-size: 13px;
    }
    .item-row:hover { background: var(--surface2); }
    .item-row-name { color: var(--text); }
    .item-row-count { color: var(--muted); font-size: 12px; margin-left: 12px; flex-shrink: 0; }

    #tooltip {
      position: fixed;
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: 4px;
      padding: 7px 11px;
      font-size: 11px;
      line-height: 1.7;
      color: var(--text);
      pointer-events: none;
      z-index: 1000;
      display: none;
      white-space: pre;
      box-shadow: 0 4px 14px rgba(0,0,0,0.5);
    }

    .back-btn {
      background: none;
      border: none;
      color: var(--muted);
      font-size: 11px;
      cursor: pointer;
      padding: 0;
      margin-bottom: 6px;
      display: block;
    }
    .back-btn:hover { color: var(--text); }
  </style>
</head>
<body>
<header>
  <h1 id="group-name">Loading…</h1>
  <span class="meta" id="header-meta"></span>
</header>
<div class="layout">
  <div class="left-panel">
    <div class="tabs">
      <button class="tab-btn active" id="tab-timeline" onclick="switchTab('timeline')">Timeline</button>
      <button class="tab-btn" id="tab-members" onclick="switchTab('members')">Members</button>
      <button class="tab-btn" id="tab-events" onclick="switchTab('events')">Events</button>
    </div>
    <div class="panel-body" id="panel-body">
      <div class="loading">Loading…</div>
    </div>
  </div>
  <div class="right-panel" id="right-panel">
    <div class="placeholder">Select a snapshot or member to get started</div>
  </div>
</div>
<div id="tooltip"></div>

<script>
'use strict';

let itemNames = {};
let clanHistory = null;
let currentTab = 'timeline';
let selectedMember = null;
let memberData = null;
let snapBefore = null;
let snapAfter = null;
let memberSearch = '';
let currentRun = null;
let currentPrevRun = null;
let eventsData = null;
let eventRunFrom = null;
let eventRunTo = null;
// Built from clan_history: { player -> { lastActive: timestamp | null } }
let memberIndex = {};

async function init() {
  try {
    const v = Date.now();
  [itemNames, clanHistory] = await Promise.all([
      fetch(`data/items.json?v=${v}`).then(r => r.json()),
      fetch(`data/clan_history.json?v=${v}`).then(r => r.json()),
    ]);
  } catch (e) {
    document.getElementById('group-name').textContent = 'Failed to load data';
    return;
  }

  document.getElementById('group-name').textContent = clanHistory.group_name;
  const visibleCount = clanHistory.runs.filter(r => Object.keys(r.member_deltas || {}).length > 0).length;
  document.getElementById('header-meta').textContent =
    `${visibleCount} snapshot${visibleCount !== 1 ? 's' : ''}`;

  buildMemberIndex();
  renderTab();
}

function buildMemberIndex() {
  memberIndex = {};
  for (const run of clanHistory.runs) {
    for (const p of (run.members_added || [])) {
      if (!memberIndex[p]) memberIndex[p] = { lastActive: null };
    }
    for (const p of Object.keys(run.member_deltas || {})) {
      if (!memberIndex[p]) memberIndex[p] = { lastActive: null };
      memberIndex[p].lastActive = run.timestamp;
    }
  }
}

function parseTs(ts) {
  return new Date(ts.replace(/T(\d{2})-(\d{2})-(\d{2})$/, 'T$1:$2:$3'));
}

function fmtDate(ts) {
  return parseTs(ts).toLocaleString(undefined, {
    month: 'short', day: 'numeric', year: 'numeric',
    hour: '2-digit', minute: '2-digit',
  });
}

function switchTab(tab) {
  currentTab = tab;
  document.getElementById('tab-timeline').classList.toggle('active', tab === 'timeline');
  document.getElementById('tab-members').classList.toggle('active', tab === 'members');
  document.getElementById('tab-events').classList.toggle('active', tab === 'events');
  renderTab();
}

function renderTab() {
  if (currentTab === 'timeline') renderTimeline();
  else if (currentTab === 'members') renderMemberList();
  else renderEventsList();
}

function renderTimeline() {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';
  const allRuns = clanHistory.runs;
  for (let i = allRuns.length - 1; i >= 0; i--) {
    const run = allRuns[i];
    const prevRun = i > 0 ? allRuns[i - 1] : null;
    const changedPlayers = Object.keys(run.member_deltas || {});
    const added = (run.members_added || []).length;
    const removed = (run.members_removed || []).length;

    if (changedPlayers.length === 0) continue;

    const entry = document.createElement('div');
    entry.className = 'run-entry';
    entry.dataset.ts = run.timestamp;

    const header = document.createElement('div');
    header.className = 'run-header';
    header.innerHTML = `
      <div class="run-date">${fmtDate(run.timestamp)}</div>
      <div class="run-sub">${changedPlayers.length} member${changedPlayers.length !== 1 ? 's' : ''} with changes${added ? ` · +${added} joined` : ''}${removed ? ` · −${removed} left` : ''}</div>
    `;

    header.addEventListener('click', () => {
      document.querySelectorAll('.run-entry').forEach(el => el.classList.remove('active'));
      entry.classList.add('active');
      renderRunOverview(run, prevRun);
    });

    entry.appendChild(header);
    body.appendChild(entry);
  }
}

function buildItemSummary(memberDeltas) {
  const map = {};
  for (const [player, deltas] of Object.entries(memberDeltas)) {
    for (const [itemId, gain] of Object.entries(deltas)) {
      if (!map[itemId]) map[itemId] = { total: 0, players: [] };
      map[itemId].total += gain;
      map[itemId].players.push({ name: player, gain });
    }
  }
  return Object.entries(map)
    .map(([itemId, d]) => ({ itemId, name: itemNames[itemId] || `Item #${itemId}`, ...d }))
    .sort((a, b) => a.name.localeCompare(b.name));
}

function showTooltip(e, text) { const t = document.getElementById('tooltip'); t.textContent = text; t.style.display = 'block'; moveTooltip(e); }
function moveTooltip(e) { const t = document.getElementById('tooltip'); t.style.left = (e.clientX + 14) + 'px'; t.style.top = (e.clientY - 10) + 'px'; }
function hideTooltip() { document.getElementById('tooltip').style.display = 'none'; }

function renderRunOverview(run, prevRun = null) {
  currentRun = run;
  currentPrevRun = prevRun;
  const changedPlayers = Object.keys(run.member_deltas || {});
  const added = (run.members_added || []).length;
  const removed = (run.members_removed || []).length;
  const itemSummary = buildItemSummary(run.member_deltas || {});

  const panel = document.getElementById('right-panel');
  panel.innerHTML = '';

  const dateLabel = prevRun
    ? `${fmtDate(prevRun.timestamp)} → ${fmtDate(run.timestamp)}`
    : fmtDate(run.timestamp);

  const hdr = document.createElement('div');
  hdr.className = 'overview-header';
  hdr.innerHTML = `
    <div style="font-size:15px;font-weight:600">${dateLabel}</div>
    <div class="run-sub" style="margin-top:4px">${changedPlayers.length} member${changedPlayers.length !== 1 ? 's' : ''} with changes${added ? ` · +${added} joined` : ''}${removed ? ` · −${removed} left` : ''}</div>
  `;
  panel.appendChild(hdr);

  const body = document.createElement('div');
  body.className = 'overview-body';

  if (changedPlayers.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'overview-section';
    sec.innerHTML = '<div class="overview-section-title">Members</div>';
    const chips = document.createElement('div');
    chips.className = 'item-summary';
    for (const p of changedPlayers) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = p;
      chip.addEventListener('click', () => openMember(p, run.timestamp));
      chips.appendChild(chip);
    }
    sec.appendChild(chips);
    body.appendChild(sec);
  }

  for (const [title, players, clickable] of [
    ['Joined', run.members_added || [], true],
    ['Left',   run.members_removed || [], false],
  ]) {
    if (players.length === 0) continue;
    const sec = document.createElement('div');
    sec.className = 'overview-section';
    sec.innerHTML = `<div class="overview-section-title">${title}</div>`;
    const chips = document.createElement('div');
    chips.className = 'item-summary';
    for (const p of players) {
      const chip = document.createElement('span');
      chip.className = 'chip';
      chip.textContent = p;
      if (clickable) chip.addEventListener('click', () => openMember(p));
      else chip.style.cursor = 'default';
      chips.appendChild(chip);
    }
    sec.appendChild(chips);
    body.appendChild(sec);
  }

  if (itemSummary.length > 0) {
    const sec = document.createElement('div');
    sec.className = 'overview-section';
    sec.innerHTML = '<div class="overview-section-title">Items gained</div>';
    const list = document.createElement('div');
    list.className = 'item-list';
    for (const item of itemSummary) {
      const row = document.createElement('div');
      row.className = 'item-row';
      row.innerHTML = `<span class="item-row-name">${item.name}</span><span class="item-row-count">×${item.total}</span>`;
      const tipText = item.players.sort((a, b) => b.gain - a.gain).map(p => `${p.name}: +${p.gain}`).join('\n');
      row.addEventListener('mouseenter', e => showTooltip(e, tipText));
      row.addEventListener('mousemove', moveTooltip);
      row.addEventListener('mouseleave', hideTooltip);
      list.appendChild(row);
    }
    sec.appendChild(list);
    body.appendChild(sec);
  }

  panel.appendChild(body);
}

function renderMemberList() {
  const body = document.getElementById('panel-body');
  body.innerHTML = '';

  const searchWrap = document.createElement('div');
  searchWrap.className = 'search-wrap';
  const input = document.createElement('input');
  input.type = 'text';
  input.placeholder = 'Search members…';
  input.value = memberSearch;
  const clearBtn = document.createElement('button');
  clearBtn.className = 'search-clear';
  clearBtn.textContent = '×';
  clearBtn.title = 'Clear search';
  clearBtn.style.display = memberSearch ? 'block' : 'none';
  clearBtn.addEventListener('click', () => {
    memberSearch = '';
    input.value = '';
    clearBtn.style.display = 'none';
    renderMemberRows(listEl);
    input.focus();
  });
  input.addEventListener('input', e => {
    memberSearch = e.target.value;
    clearBtn.style.display = memberSearch ? 'block' : 'none';
    renderMemberRows(listEl);
  });
  searchWrap.appendChild(input);
  searchWrap.appendChild(clearBtn);
  body.appendChild(searchWrap);

  const listEl = document.createElement('div');
  body.appendChild(listEl);
  renderMemberRows(listEl);
}

function renderMemberRows(container) {
  container.innerHTML = '';
  const filter = memberSearch.toLowerCase();
  const players = Object.keys(memberIndex)
    .filter(p => p.toLowerCase().includes(filter))
    .sort((a, b) => {
      const ta = memberIndex[a].lastActive || '';
      const tb = memberIndex[b].lastActive || '';
      return tb.localeCompare(ta) || a.localeCompare(b);
    });

  for (const player of players) {
    const row = document.createElement('div');
    row.className = 'member-row' + (selectedMember === player ? ' active' : '');
    row.innerHTML = `
      <span class="member-row-name">${player}</span>
      <span class="member-row-date">${memberIndex[player].lastActive ? fmtDate(memberIndex[player].lastActive) : '—'}</span>
    `;
    row.addEventListener('click', () => openMember(player));
    container.appendChild(row);
  }
}

async function renderEventsList() {
  const body = document.getElementById('panel-body');
  body.innerHTML = '<div class="loading">Loading…</div>';
  if (!eventsData) {
    try {
      eventsData = await fetch(`data/events.json?v=${Date.now()}`).then(r => r.json());
    } catch {
      body.innerHTML = '<div class="loading">Failed to load events.</div>';
      return;
    }
  }
  body.innerHTML = '';
  for (const event of eventsData.events) {
    const row = document.createElement('div');
    row.className = 'member-row';
    row.innerHTML = `
      <span class="member-row-name">${event.name}</span>
      <span class="member-row-date">${fmtShortDate(event.start)} – ${fmtShortDate(event.end)}</span>
    `;
    row.addEventListener('click', () => renderEventDetail(event));
    body.appendChild(row);
  }
}

function fmtShortDate(isoStr) {
  return new Date(isoStr).toLocaleDateString(undefined, { month: 'short', day: 'numeric', year: 'numeric' });
}

function renderEventDetail(event) {
  eventRunFrom = null;
  eventRunTo = null;
  const start = new Date(event.start);
  const end = new Date(event.end);
  const eventRuns = clanHistory.runs.filter(r => {
    const t = parseTs(r.timestamp);
    return t >= start && t <= end;
  });

  const panel = document.getElementById('right-panel');
  panel.innerHTML = '';

  const hdr = document.createElement('div');
  hdr.className = 'overview-header';
  hdr.innerHTML = `
    <div style="font-size:15px;font-weight:600">${event.name}</div>
    ${event.description ? `<div class="run-sub" style="margin-top:3px">${event.description}</div>` : ''}
    <div class="run-sub" style="margin-top:3px">${fmtShortDate(event.start)} → ${fmtShortDate(event.end)} · ${eventRuns.length} run${eventRuns.length !== 1 ? 's' : ''}</div>
  `;
  if (event.players && event.players.length > 0) {
    const SHOW = 8;
    const players = event.players;
    const pWrap = document.createElement('div');
    pWrap.style.cssText = 'display:flex;flex-wrap:wrap;gap:4px;margin-top:8px';

    const renderChips = (expanded) => {
      pWrap.innerHTML = '';
      const visible = expanded ? players : players.slice(0, SHOW);
      for (const p of visible) {
        const chip = document.createElement('span');
        chip.className = 'chip';
        chip.style.cursor = 'default';
        chip.textContent = p;
        pWrap.appendChild(chip);
      }
      if (players.length > SHOW) {
        const toggle = document.createElement('span');
        toggle.className = 'chip';
        toggle.textContent = expanded ? 'Show less' : `+${players.length - SHOW} more`;
        toggle.addEventListener('click', () => renderChips(!expanded));
        pWrap.appendChild(toggle);
      }
    };
    renderChips(false);
    hdr.appendChild(pWrap);
  }
  panel.appendChild(hdr);

  if (eventRuns.length < 2) {
    const msg = document.createElement('div');
    msg.className = 'empty-msg';
    msg.style.padding = '32px';
    msg.textContent = eventRuns.length === 0 ? 'No snapshot runs found in this event period.' : 'Only one run found — need at least two to compare.';
    panel.appendChild(msg);
    return;
  }

  const body = document.createElement('div');
  body.className = 'detail-body';

  // Run picker
  const picker = document.createElement('div');
  picker.className = 'snap-picker';
  picker.innerHTML = `
    <div class="snap-picker-head">
      <span>From</span><span>To</span><span>Date</span><span></span>
    </div>
  `;
  const list = document.createElement('div');
  list.className = 'snap-list';
  eventRuns.forEach((run, idx) => {
    const gained = Object.values(run.member_deltas || {}).reduce((sum, d) => sum + Object.values(d).reduce((a, b) => a + b, 0), 0);
    const badge = gained > 0 ? `+${gained}` : '';
    const row = document.createElement('div');
    row.className = 'snap-row';
    row.innerHTML = `
      <input type="radio" name="evt-from" value="${idx}">
      <input type="radio" name="evt-to" value="${idx}">
      <span>${fmtDate(run.timestamp)}</span>
      <span class="snap-badge">${badge}</span>
    `;
    const [rFrom, rTo] = row.querySelectorAll('input');
    rFrom.addEventListener('change', () => { eventRunFrom = idx; updateEventCompareBtn(); });
    rTo.addEventListener('change', () => { eventRunTo = idx; updateEventCompareBtn(); });
    list.appendChild(row);
  });
  picker.appendChild(list);
  const wrap = document.createElement('div');
  wrap.className = 'compare-wrap';
  const btn = document.createElement('button');
  btn.className = 'compare-btn';
  btn.id = 'evt-compare-btn';
  btn.disabled = true;
  btn.textContent = 'Compare';
  btn.addEventListener('click', () => renderEventComparison(eventRuns, eventRunFrom, eventRunTo, event));
  wrap.appendChild(btn);
  picker.appendChild(wrap);
  body.appendChild(picker);

  const cmpArea = document.createElement('div');
  cmpArea.className = 'cmp-area';
  cmpArea.id = 'evt-cmp-area';
  cmpArea.innerHTML = '<div class="empty-msg">Select two runs and click Compare</div>';
  body.appendChild(cmpArea);
  panel.appendChild(body);

  // Auto-select first and last run
  eventRunFrom = 0;
  eventRunTo = eventRuns.length - 1;
  list.querySelectorAll('input[name="evt-from"]')[0].checked = true;
  list.querySelectorAll('input[name="evt-to"]')[eventRuns.length - 1].checked = true;
  updateEventCompareBtn();
  renderEventComparison(eventRuns, eventRunFrom, eventRunTo, event);
}

function updateEventCompareBtn() {
  const btn = document.getElementById('evt-compare-btn');
  if (btn) btn.disabled = eventRunFrom === null || eventRunTo === null || eventRunFrom === eventRunTo;
}

function aggregateDeltas(eventRuns, fromIdx, toIdx, playerFilter) {
  const lo = Math.min(fromIdx, toIdx);
  const hi = Math.max(fromIdx, toIdx);
  const result = {};
  for (let i = lo + 1; i <= hi; i++) {
    for (const [player, deltas] of Object.entries(eventRuns[i].member_deltas || {})) {
      if (playerFilter && !playerFilter.has(player)) continue;
      for (const [itemId, gain] of Object.entries(deltas)) {
        if (!result[itemId]) result[itemId] = { total: 0, players: {} };
        result[itemId].total += gain;
        result[itemId].players[player] = (result[itemId].players[player] || 0) + gain;
      }
    }
  }
  return result;
}

function renderEventComparison(eventRuns, fromIdx, toIdx, event) {
  const lo = Math.min(fromIdx, toIdx);
  const hi = Math.max(fromIdx, toIdx);
  const playerFilter = event.players ? new Set(event.players) : null;
  const aggregated = aggregateDeltas(eventRuns, lo, hi, playerFilter);
  const area = document.getElementById('evt-cmp-area');

  const rows = Object.entries(aggregated)
    .map(([itemId, d]) => ({ name: itemNames[itemId] || `Item #${itemId}`, ...d }))
    .sort((a, b) => a.name.localeCompare(b.name));

  if (rows.length === 0) {
    area.innerHTML = '<div class="empty-msg">No item changes between these runs.</div>';
    return;
  }

  area.innerHTML = `<div class="cmp-heading"><strong>${fmtDate(eventRuns[lo].timestamp)}</strong> → <strong>${fmtDate(eventRuns[hi].timestamp)}</strong></div>`;
  const listEl = document.createElement('div');
  listEl.className = 'item-list';
  for (const row of rows) {
    const el = document.createElement('div');
    el.className = 'item-row';
    el.innerHTML = `<span class="item-row-name">${row.name}</span><span class="item-row-count">×${row.total}</span>`;
    const tipText = Object.entries(row.players).sort((a, b) => b[1] - a[1]).map(([p, n]) => `${p}: +${n}`).join('\n');
    el.addEventListener('mouseenter', e => showTooltip(e, tipText));
    el.addEventListener('mousemove', moveTooltip);
    el.addEventListener('mouseleave', hideTooltip);
    listEl.appendChild(el);
  }
  area.appendChild(listEl);
}

async function openMember(player, targetTimestamp = null) {
  selectedMember = player;
  snapBefore = null;
  snapAfter = null;
  memberData = null;

  const panel = document.getElementById('right-panel');
  panel.innerHTML = '<div class="loading">Loading…</div>';

  try {
    memberData = await fetch(`data/members/${encodeURIComponent(player)}.json?v=${Date.now()}`).then(r => {
      if (!r.ok) throw new Error(r.status);
      return r.json();
    });
  } catch {
    panel.innerHTML = '<div class="placeholder">Failed to load member data.</div>';
    return;
  }

  if (targetTimestamp) {
    const idx = memberData.snapshots.findIndex(s => s.timestamp === targetTimestamp);
    if (idx > 0) {
      snapBefore = idx - 1;
      snapAfter = idx;
    }
  } else {
    const last = memberData.snapshots.length - 1;
    if (last > 0) {
      snapBefore = last - 1;
      snapAfter = last;
    }
  }

  if (currentTab === 'members') {
    document.querySelectorAll('.member-row').forEach(el => {
      el.classList.toggle('active', el.querySelector('.member-row-name').textContent === player);
    });
  }

  renderDetail();

  if (snapBefore !== null && snapAfter !== null) {
    document.querySelector(`input[name="snap-bef"][value="${snapBefore}"]`).checked = true;
    document.querySelector(`input[name="snap-aft"][value="${snapAfter}"]`).checked = true;
    updateCompareBtn();
    renderComparison();
  }
}

function renderDetail() {
  const panel = document.getElementById('right-panel');
  const displayName = memberData.display_name || selectedMember;
  const snaps = memberData.snapshots;

  panel.innerHTML = `
    <div class="detail-header">
      ${currentRun ? `<button class="back-btn" onclick="renderRunOverview(currentRun, currentPrevRun)">← Overview</button>` : ''}
      <h2>${displayName}</h2>
      <div class="detail-meta">${snaps.length} snapshot${snaps.length !== 1 ? 's' : ''} · select Before and After to compare</div>
    </div>
    <div class="detail-body">
      <div class="snap-picker">
        <div class="snap-picker-head">
          <span>Bef</span><span>Aft</span><span>Date</span><span></span>
        </div>
        <div class="snap-list" id="snap-list"></div>
        <div class="compare-wrap">
          <button class="compare-btn" id="compare-btn" disabled onclick="renderComparison()">Compare</button>
        </div>
      </div>
      <div class="cmp-area" id="cmp-area">
        <div class="empty-msg">Choose two snapshots and click Compare</div>
      </div>
    </div>
  `;

  renderSnapList();
}

function renderSnapList() {
  const list = document.getElementById('snap-list');
  list.innerHTML = '';
  const snaps = memberData.snapshots;

  // Most recent first
  const reversed = snaps.map((s, i) => ({ ...s, idx: i })).reverse();

  for (const { timestamp, idx } of reversed) {
    // Count items gained vs previous snapshot
    let badge = '';
    if (idx > 0) {
      const prev = snaps[idx - 1].items;
      const curr = snaps[idx].items;
      let gained = 0;
      for (const [id, cnt] of Object.entries(curr)) {
        if (cnt > (prev[id] || 0)) gained++;
      }
      if (gained > 0) badge = `+${gained}`;
    }

    const row = document.createElement('div');
    row.className = 'snap-row';
    row.innerHTML = `
      <input type="radio" name="snap-bef" value="${idx}">
      <input type="radio" name="snap-aft" value="${idx}">
      <span>${fmtDate(timestamp)}</span>
      <span class="snap-badge">${badge}</span>
    `;
    const [rBef, rAft] = row.querySelectorAll('input');
    rBef.addEventListener('change', () => { snapBefore = idx; updateCompareBtn(); });
    rAft.addEventListener('change', () => { snapAfter = idx; updateCompareBtn(); });
    list.appendChild(row);
  }
}

function updateCompareBtn() {
  const btn = document.getElementById('compare-btn');
  if (btn) btn.disabled = snapBefore === null || snapAfter === null || snapBefore === snapAfter;
}

function renderComparison() {
  if (snapBefore === null || snapAfter === null || snapBefore === snapAfter) return;

  const loIdx = Math.min(snapBefore, snapAfter);
  const hiIdx = Math.max(snapBefore, snapAfter);
  const before = memberData.snapshots[loIdx];
  const after = memberData.snapshots[hiIdx];

  const allIds = new Set([...Object.keys(before.items), ...Object.keys(after.items)]);
  const rows = [];
  for (const id of allIds) {
    const b = before.items[id] || 0;
    const a = after.items[id] || 0;
    if (a !== b) rows.push({ id, name: itemNames[id] || `Item #${id}`, b, a, delta: a - b });
  }
  rows.sort((a, b) => b.delta - a.delta || a.name.localeCompare(b.name));

  const area = document.getElementById('cmp-area');
  if (rows.length === 0) {
    area.innerHTML = '<div class="empty-msg">No item changes between these snapshots.</div>';
    return;
  }

  area.innerHTML = `
    <div class="cmp-heading">
      <strong>${fmtDate(before.timestamp)}</strong>
      <span> → </span>
      <strong>${fmtDate(after.timestamp)}</strong>
    </div>
    <table>
      <thead>
        <tr>
          <th>Item</th>
          <th style="text-align:right">Before</th>
          <th style="text-align:right">After</th>
          <th style="text-align:right">+/−</th>
        </tr>
      </thead>
      <tbody>
        ${rows.map(r => `
          <tr>
            <td>${r.name}</td>
            <td class="td-num">${r.b}</td>
            <td class="td-num">${r.a}</td>
            <td class="delta">${r.delta > 0 ? '+' : ''}${r.delta}</td>
          </tr>
        `).join('')}
      </tbody>
    </table>
  `;
}

init();
</script>
</body>
</html>
