name: Daily Snapshot

on:
  #schedule:
  #  - cron: '0 6 * * *'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  snapshot:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ssh-key: ${{ secrets.DEPLOY_KEY }}

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Download snapshot
        run: node download.js

      - name: Commit and push data
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add data/
          git diff --staged --quiet || git commit -m "chore: snapshot $(date -u +'%Y-%m-%dT%H:%M:%SZ')"
          git push

  workflow-keepalive:
    if: github.event_name == 'schedule'
    runs-on: ubuntu-24.04
    permissions:
      actions: write
    steps:
      - uses: liskin/gh-workflow-keepalive@f72ff1a1336129f29bf0166c0fd0ca6cf1bcb38c # 1.2.1
